<main class="main">
  <mat-toolbar>
    <mat-toolbar-row>
      <span class="title">
        {{settings.title}}
      </span>
      <span class="flex-spacer"></span>
      @if (authService.isLoggedIn()) {
        <button mat-button (click)="onMenuChoice('entries')">Entries</button>
        <button mat-button (click)="onMenuChoice('plans')">Plans</button>
        <button mat-button>Bibles</button>
        <button mat-button (click)="onMenuChoice('profile')">Profile</button>
        <button mat-icon-button class="toolbar-icon" (click)="logout()">
          <mat-icon>logout</mat-icon>
        </button>
      }
    </mat-toolbar-row>
  </mat-toolbar>
  <div class="content">
    <router-outlet />
  </div>
  <footer>
    <mat-toolbar class="footer-toolbar">
      <mat-toolbar-row>
        <span class="status">{{ authService.errorMsg() }}</span>
        <span class="flex-spacer"></span>
        <span class="status">v{{ settings.version }}</span>
      </mat-toolbar-row>
    </mat-toolbar>
  </footer>
</main>
