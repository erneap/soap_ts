<mat-dialog-actions>
  @if (data.plantype! !== 'reading') {
    <div class="icon" (click)="onClick('add-child')"
      matTooltip="add a new child">
      <mat-icon>add</mat-icon>
    </div>
  }
  <div class="icon" (click)="onClick('delete')"
    matTooltip="delete this item">
    <mat-icon>cancel</mat-icon>
  </div>
  @if (data.position! > 1) {
    <div class="icon" (click)="onClick('move-up')"
      matTooltip="move item up the list">
      <mat-icon>arrow_upward</mat-icon>
    </div>
  }
  @if (data.position! < data.length!) {
    <div class="icon" (click)="onClick('move-down')"
      matTooltip="move this item down the list">
      <mat-icon>arrow_downward</mat-icon>
  </div>
  }
</mat-dialog-actions>
