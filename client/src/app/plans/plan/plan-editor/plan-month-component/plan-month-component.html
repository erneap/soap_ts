<mat-expansion-panel hideToggle>
  <mat-expansion-panel-header color="primary">
    @if (plantype()!.toLowerCase() === 'journal') {
      <mat-panel-title>
        {{months[month()!.month - 1]}}
        <span class="flex-spacer"></span>
        <div class="icon" matTooltip="Add new day to period">
          <mat-icon>add_circle</mat-icon>
        </div>
        <div class="icon" matTooltip="More actions">
          <mat-icon>more_vert</mat-icon>
        </div>
      </mat-panel-title>
    } @else {
      <mat-panel-title>Full Plan List</mat-panel-title>
    }
  </mat-expansion-panel-header> 
  <mat-accordion>
    @for (day of month()!.days; track `${key()!}-${day.dayOfMonth}`) {
      <app-plan-day-component [day]="day" [books]="books()" 
        [key]="key()! + '-' + day.dayOfMonth">
      </app-plan-day-component>
    }
  </mat-accordion>
</mat-expansion-panel>
